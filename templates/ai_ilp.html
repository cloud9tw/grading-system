<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 個人化學習計畫 (ILP) - 管理員專區</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .markdown-content h2 { font-size: 1.5rem; font-weight: 800; color: #1e293b; margin-top: 1.5rem; margin-bottom: 0.75rem; border-left: 4px solid #4f46e5; padding-left: 1rem; }
        .markdown-content p { color: #475569; line-height: 1.7; margin-bottom: 1rem; }
        .markdown-content ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; color: #475569; }
        .markdown-content li { margin-bottom: 0.5rem; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen pb-12">
    <nav class="bg-white shadow-sm mb-8">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-gray-900 flex items-center">
                <span class="mr-2">🤖</span> AI 個人化學習計畫 (ILP)
            </h1>
            <a href="/admin" class="text-sm font-medium text-indigo-600 hover:text-indigo-800 transition-colors">← 返回管理後台</a>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4">
        <!-- 搜尋與選擇學員區 -->
        <div class="glass rounded-3xl p-8 shadow-xl mb-8">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-gray-800">學員分析中心</h2>
                <div class="relative">
                    <input type="text" id="studentSearch" placeholder="搜尋姓名或職稱..." class="bg-white border border-gray-200 rounded-xl px-4 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all w-64">
                    <svg class="w-4 h-4 text-gray-400 absolute right-3 top-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
            </div>

            <!-- 學員卡片清單 -->
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 max-h-96 overflow-y-auto pr-2 custom-scrollbar" id="studentGrid">
                {% for s in students %}
                <div class="student-card group bg-white border border-gray-100 p-4 rounded-2xl hover:border-indigo-500 hover:shadow-md transition-all cursor-pointer" 
                     onclick="selectAndAnalyze('{{ s.姓名 }}')">
                    <div class="flex items-center justify-between">
                        <div>
                            <div class="font-bold text-gray-900 group-hover:text-indigo-600 transition-colors">{{ s.姓名 }}</div>
                            <div class="text-xs text-gray-500">{{ s.職稱 }}</div>
                        </div>
                        <div class="text-indigo-500 opacity-0 group-hover:opacity-100 transition-opacity">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>
            <p class="text-xs text-gray-400 mt-6">註：點擊上方學員卡片即可啟動 <b>GCP Vertex AI 匿名分析引擎</b>。系統會自動彙整該生在所有站別的 EPA 表現與質性回饋。</p>
        </div>

        <!-- 進度條 -->
        <div id="progressBox" class="hidden mb-8 glass rounded-2xl p-6 shadow-lg">
            <div class="flex justify-between mb-2">
                <span id="statusLabel" class="text-sm font-medium text-indigo-600 italic">正在初始化分析引擎...</span>
                <span id="progressPercent" class="text-sm font-bold text-gray-500">0%</span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-2">
                <div id="progressBar" class="bg-indigo-600 h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <!-- 分析結果顯示區 -->
        <div id="resultCard" class="hidden glass rounded-3xl p-10 shadow-2xl animate-fade-in border-2 border-indigo-50">
            <div class="flex justify-between items-start mb-8 border-b border-gray-100 pb-6">
                <div>
                    <span class="inline-block px-3 py-1 bg-indigo-100 text-indigo-700 text-xs font-bold rounded-full mb-2">AI-GENERATED REPORT</span>
                    <h3 id="resultHeader" class="text-3xl font-black text-gray-900 tracking-tight">個人化學習計畫 (ILP)</h3>
                </div>
                <button onclick="window.print()" class="p-2 text-gray-400 hover:text-indigo-600 transition-colors" title="列印報告">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                </button>
            </div>
            
            <div id="reportContent" class="markdown-content">
                <!-- AI 內容將渲染於此 -->
            </div>

            <div class="mt-12 pt-6 border-t border-gray-100 text-center">
                <p class="text-xs text-gray-400">本報告由 GCP Vertex AI (Gemini 2.0 Flash) 根據匿名數據生成，僅供臨床教學參考。</p>
            </div>
        </div>
    </main>

    <script>
        const studentSearch = document.getElementById('studentSearch');
        const studentGrid = document.getElementById('studentGrid');
        const resultCard = document.getElementById('resultCard');
        const progressBox = document.getElementById('progressBox');
        const reportContent = document.getElementById('reportContent');

        // 搜尋過濾邏輯
        studentSearch.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const cards = studentGrid.querySelectorAll('.student-card');
            cards.forEach(card => {
                const text = card.innerText.toLowerCase();
                card.style.display = text.includes(term) ? 'block' : 'none';
            });
        });

        async function selectAndAnalyze(studentName) {
            if (!studentName) return;

            // UI Reset
            resultCard.classList.add('hidden');
            progressBox.classList.remove('hidden');
            updateProgress(10, '正在從 BigQuery 抓取 EPA 歷程...');
            
            // 捲動到進度條
            progressBox.scrollIntoView({ behavior: 'smooth', block: 'center' });

            try {
                const response = await fetch('/admin/ai_analysis', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `student_name=${encodeURIComponent(studentName)}`
                });

                if (!response.ok) throw new Error('API 請求失敗');

                updateProgress(40, '正在抓取 CEEP 教學記錄評語...');
                await new Promise(r => setTimeout(r, 600));
                
                updateProgress(70, '正在進行匿名化去識別處理...');
                await new Promise(r => setTimeout(r, 600));

                updateProgress(90, '正在調用 GCP Vertex AI 進行深度分析...');
                
                const data = await response.json();
                
                updateProgress(100, '分析完成！');
                
                // 渲染 Markdown
                reportContent.innerHTML = marked.parse(data.report);
                
                setTimeout(() => {
                    progressBox.classList.add('hidden');
                    resultCard.classList.remove('hidden');
                    resultCard.scrollIntoView({ behavior: 'smooth' });
                }, 500);

            } catch (error) {
                alert('分析發生錯誤：' + error.message);
                progressBox.classList.add('hidden');
            }
        }

        function updateProgress(percent, status) {
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('progressPercent').innerText = percent + '%';
            document.getElementById('statusLabel').innerText = status;
        }
    </script>
</body>
</html>
