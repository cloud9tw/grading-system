<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學員專屬 QR Code 列印牆</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        /* 列印專屬樣式 */
        @media print {
            body { font-size: 12pt; background-color: white !important; }
            .no-print { display: none !important; }
            .print-break-inside-avoid { break-inside: avoid; }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-8">

    <div class="max-w-7xl mx-auto">
        
        <div class="flex justify-between items-center mb-8 no-print bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <div>
                <h1 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
                    <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm14 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path></svg>
                    學員專屬 QR Code (掃碼快評系統)
                </h1>
                <p class="text-sm text-gray-500 mt-2">點擊列印按鈕即可將條碼印出，裁切後可貼於學員識別證上。<br>教師掃描後無須手動尋找學員，系統將自動跳轉並帶入該學員之評分表。</p>
            </div>
            <div class="flex gap-4">
                <a href="/" class="px-5 py-2.5 bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold rounded-lg transition">回首頁</a>
                <button onclick="window.print()" class="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg shadow-md transition flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                    列印條碼牆
                </button>
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
            {% for student in students %}
            <div class="bg-white border border-gray-200 rounded-xl p-6 flex flex-col items-center justify-center shadow-sm print-break-inside-avoid">
                <span class="text-xl font-bold text-gray-900 mb-1">{{ student.name }}</span>
                <span class="text-xs text-gray-500 mb-4 bg-gray-100 px-2 py-1 rounded">ID: {{ student.id }}</span>
                
                <!-- 使用 API 即時生成 QR Code -->
                <div class="p-2 border-2 border-dashed border-gray-200 rounded-lg mb-3">
                    <img src="{{ student.qr_img_url }}" 
                         alt="QR Code for {{ student.name }}" 
                         class="w-32 h-32 object-contain rounded">
                </div>
                
                <span class="text-[10px] text-gray-400 text-center break-all">📱 掃碼進入評分系統</span>
            </div>
            {% endfor %}
            
            {% if not students %}
            <div class="col-span-full text-center py-10 bg-white rounded-xl border border-dashed border-gray-300">
                <p class="text-gray-500">目前找不到任何學員資料。請確認 Google Sheets 設定。</p>
            </div>
            {% endif %}
        </div>
        
    </div>

</body>
</html>
