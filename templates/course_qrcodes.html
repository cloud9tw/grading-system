<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>早 8 課程 QR Code 管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        @media print {
            .no-print {
                display: none !important;
            }

            .print-break {
                page-break-inside: avoid;
            }
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen pb-12">

    <!-- 頂部導覽 -->
    <nav class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50 no-print">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="flex items-center text-gray-900 hover:text-gray-600 transition">
                        <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                        </svg>
                        <span class="font-bold text-xl">課程簽到管理</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8">
        <div class="mb-8 no-print">
            <h1 class="text-3xl font-extrabold text-gray-900">早 8 課程簽到列表</h1>
            <p class="mt-2 text-gray-600">系統會自動根據「早 8 課程簽到」試算表的內容產生 QR Code。您可以直接在螢幕上供學員掃描，或列印成紙本。</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            {% for course in courses %}
            <div
                class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden print-break flex flex-col items-center p-6 bg-white">
                <div class="w-full mb-4">
                    <span
                        class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold bg-blue-100 text-blue-800 mb-1">
                        {{ course.授課教師 }} 老師
                    </span>
                    <h3 class="text-lg font-bold text-gray-900 leading-tight">{{ course.課程名稱 }}</h3>
                    <div class="mt-2 flex items-center gap-4 text-sm text-gray-500">
                        <span class="flex items-center gap-1 text-xs">📅 {{ course.上課日期 }}</span>
                        <span class="flex items-center gap-1 text-xs">⏰ {{ course.開始時間 }}</span>
                    </div>
                </div>

                <!-- QR Code 容器 -->
                <div class="qr-container bg-white p-2 border-2 border-gray-100 rounded-xl mb-4"
                    data-url="{{ request.host_url }}course_checkin?course={{ course.課程名稱 | urlencode }}">
                </div>

                <div class="w-full flex justify-between items-center no-print mt-auto pt-4 border-t border-gray-50">
                    <span class="text-indigo-600 font-bold text-sm">{{ course.時數 }} 小時</span>
                    <button onclick="openManualCheckin('{{ course.課程名稱 }}', '{{ course.時數 }}')"
                        class="text-xs bg-gray-100 text-gray-600 hover:bg-gray-200 px-3 py-1.5 rounded-lg transition font-semibold">
                        手動補登
                    </button>
                </div>
            </div>
            {% endfor %}
        </div>
    </main>

    <!-- 手動補登 Modal -->
    <div id="manualModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-[100] no-print px-4">
        <div class="bg-white rounded-2xl p-8 max-w-md w-full shadow-2xl">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <h2 class="text-xl font-bold text-gray-900">手動補登時數</h2>
                    <p id="targetCourseName" class="text-sm text-blue-600 font-semibold"></p>
                </div>
                <button onclick="closeManualCheckin()" class="text-gray-400 hover:text-gray-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                        </path>
                    </svg>
                </button>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">學員代號 (ID)</label>
                    <input type="text" id="manualSid" placeholder="例如: 8"
                        class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">學員姓名</label>
                    <input type="text" id="manualName" placeholder="學員姓名"
                        class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                </div>
                <button onclick="submitManual()" id="submitBtn"
                    class="w-full bg-indigo-600 py-3 rounded-lg text-white font-bold hover:bg-indigo-700 transition shadow-md">
                    確認補登
                </button>
            </div>
        </div>
    </div>

    <script>
        // 初始化 QR Code
        document.querySelectorAll('.qr-container').forEach(container => {
            const url = container.getAttribute('data-url');
            new QRCode(container, {
                text: url,
                width: 200,
                height: 200,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
        });

        let currentCourse = null;
        let currentHours = 0;

        function openManualCheckin(name, hours) {
            currentCourse = name;
            currentHours = hours;
            document.getElementById('targetCourseName').innerText = name;
            document.getElementById('manualModal').style.display = 'flex';
        }

        function closeManualCheckin() {
            document.getElementById('manualModal').style.display = 'none';
        }

        async function submitManual() {
            const sid = document.getElementById('manualSid').value.trim();
            const name = document.getElementById('manualName').value.trim();
            const btn = document.getElementById('submitBtn');

            if (!sid || !name) {
                alert('請填寫學員 ID 與姓名');
                return;
            }

            btn.disabled = true;
            btn.innerText = '處理中...';

            try {
                const res = await fetch('/api/admin/manual_checkin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        student_id: sid,
                        student_name: name,
                        course_name: currentCourse,
                        hours: currentHours
                    })
                });
                const result = await res.json();
                if (result.success) {
                    alert('手動補登成功！');
                    closeManualCheckin();
                } else {
                    alert('失敗: ' + (result.error || '不明原因'));
                }
            } catch (e) {
                alert('連線失敗: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.innerText = '確認補登';
            }
        }
    </script>
</body>

</html>
