<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學員成績與學習軌跡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen">

    <!-- 頂部導覽列 -->
    <nav class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <svg class="w-8 h-8 text-green-600 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253">
                        </path>
                    </svg>
                    <span class="font-bold text-xl text-gray-900">學員學習軌跡</span>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="flex items-center space-x-2">
                        {% if roles and roles|length > 1 %}
                        <button onclick="switchRole()"
                            class="text-xs bg-indigo-100 text-indigo-700 px-2 py-1 rounded hover:bg-indigo-200 transition font-bold border border-indigo-200 shadow-sm mr-2">切換教師介面</button>
                        {% endif %}
                        <img class="h-8 w-8 rounded-full" src="{{ user.picture }}" alt="User avatar"
                            onerror="this.src='https://ui-avatars.com/api/?name={{ user.name }}'">
                        <span class="text-sm font-medium text-gray-700">{{ user.name }}</span>
                    </div>
                    <a href="/logout"
                        class="text-sm font-medium text-red-600 hover:text-red-800 transition-colors">登出</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto py-8 px-4 sm:px-6 lg:px-8">

        <!-- 個人資訊面板與 QR Code -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden mb-8">
            <div
                class="p-6 sm:p-8 flex flex-col sm:flex-row items-center sm:items-start gap-6 relative overflow-hidden">
                <div class="absolute -right-16 -top-16 w-64 h-64 bg-green-50 rounded-full blur-3xl opacity-50 z-0">
                </div>

                <!-- QR Code 區塊 -->
                <div class="bg-white p-2 rounded-xl shadow-sm border-2 border-dashed border-gray-300 z-10 shrink-0">
                    <img src="{{ qr_img_url }}" class="w-40 h-40 object-contain" alt="個人評核 QR Code">
                </div>

                <div class="flex-1 flex flex-col justify-center sm:h-44 z-10 text-center sm:text-left">
                    <h2 class="text-2xl font-bold text-gray-900 mb-2">{{ student_info.name }}</h2>
                    <p class="text-gray-500 font-mono bg-gray-100 py-1 px-3 rounded-md w-fit mx-auto sm:mx-0">{{
                        student_info.id }}</p>
                    <p class="mt-4 text-sm text-gray-600 max-w-md">將此條碼出示給臨床教師掃描，對方即可直接進入您的專屬評分畫面。</p>
                </div>
            </div>
        </div>

        <!-- 視覺化數據中心 -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 sm:p-8">
            <h3 class="text-lg font-bold text-gray-900 mb-6 flex items-center gap-2">
                <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"></path>
                </svg>
                各站別信賴等級成長曲線
            </h3>

            <div id="loadingIndicator" class="text-center py-10">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-green-600 mx-auto mb-4"></div>
                <p class="text-gray-500 text-sm">正在載入學習歷程...</p>
            </div>

            <div id="noDataAlert"
                class="hidden text-center py-10 bg-gray-50 rounded-xl border border-dashed border-gray-300">
                <p class="text-gray-500">目前還沒有收到任何評分紀錄喔！</p>
            </div>

            <div id="dashboardContent" class="hidden">
                <!-- 站別按鈕 -->
                <div id="stationButtons" class="flex flex-wrap gap-2 mb-8">
                    <!-- 動態生成 -->
                </div>

                <!-- 曲線圖容器 -->
                <div class="relative h-80 w-full sm:h-96">
                    <canvas id="growthChart"></canvas>
                </div>
            </div>
        </div>
        
        <!-- 出勤紀錄表 -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden mt-8 p-6 sm:p-8 relative">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-lg font-bold text-gray-900 flex items-center gap-2">
                    <svg class="w-5 h-5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                    打卡出勤紀錄表
                </h3>
                <button onclick="exportPDF()" class="text-sm bg-red-50 text-red-600 hover:bg-red-100 px-3 py-1.5 rounded-lg font-semibold flex items-center gap-1 transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    匯出 PDF
                </button>
            </div>
            
            <div id="attendanceContainer" class="overflow-x-auto">
                <div class="text-center py-6 text-gray-500 text-sm">載入中...</div>
            </div>
        </div>
    </main>

    <script>
        let myChart = null;
        let allStats = {};

        document.addEventListener('DOMContentLoaded', async () => {
            await fetchStats();
            await fetchAttendance();
        });

        async function fetchStats() {
            try {
                const res = await fetch('/api/student_stats');
                const result = await res.json();

                document.getElementById('loadingIndicator').classList.add('hidden');

                if (result.success && Object.keys(result.data).length > 0) {
                    allStats = result.data;
                    document.getElementById('dashboardContent').classList.remove('hidden');
                    renderButtons();
                    // 預設渲染第一個站別
                    const firstStation = Object.keys(allStats)[0];
                    renderChart(firstStation);
                } else {
                    document.getElementById('noDataAlert').classList.remove('hidden');
                }
            } catch (e) {
                console.error("載入失敗", e);
                document.getElementById('loadingIndicator').innerHTML = '<p class="text-red-500">網路錯誤，無法載入資料</p>';
            }
        }

        function renderButtons() {
            const container = document.getElementById('stationButtons');
            container.innerHTML = '';

            const stations = Object.keys(allStats);
            stations.forEach((station, index) => {
                const btn = document.createElement('button');
                btn.className = `px-4 py-2 rounded-lg text-sm font-medium transition-colors duration-200 focus:outline-none station-btn ${index === 0 ? 'bg-blue-600 text-white shadow-md ring-2 ring-blue-300' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}`;
                btn.textContent = station;
                btn.onclick = () => {
                    // 更新按鈕視覺狀態
                    document.querySelectorAll('.station-btn').forEach(b => {
                        b.className = 'px-4 py-2 rounded-lg text-sm font-medium transition-colors duration-200 focus:outline-none station-btn bg-gray-100 text-gray-700 hover:bg-gray-200';
                    });
                    btn.className = 'px-4 py-2 rounded-lg text-sm font-medium transition-colors duration-200 focus:outline-none station-btn bg-blue-600 text-white shadow-md ring-2 ring-blue-300';

                    renderChart(station);
                };
                container.appendChild(btn);
            });
        }

        function renderChart(station) {
            let records = allStats[station];
            
            // 強制確保：時間由左向右按時間排序 (Chronological sort)
            records.sort((a, b) => new Date(a.time) - new Date(b.time));

            // 將不連續/空值濾除或當作 0 (這裡選用保留 null 以讓線條中斷或跳過)
            const labels = records.map(r => r.time.split(' ')[0]); // 只取日期
            const dataOPA1 = records.map(r => r.opa1);
            const dataOPA2 = records.map(r => r.opa2);
            const dataOPA3 = records.map(r => r.opa3);

            const ctx = document.getElementById('growthChart').getContext('2d');

            if (myChart) {
                myChart.destroy();
            }

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'OPA1 (檢查前準備)',
                            data: dataOPA1,
                            borderColor: '#3B82F6', // Blue
                            backgroundColor: 'rgba(59, 130, 246, 0.1)',
                            borderWidth: 3,
                            pointBackgroundColor: '#fff',
                            pointBorderColor: '#3B82F6',
                            pointRadius: 4,
                            pointHoverRadius: 6,
                            tension: 0.3, // 平滑曲線
                            spanGaps: true
                        },
                        {
                            label: 'OPA2 (造影檢查)',
                            data: dataOPA2,
                            borderColor: '#10B981', // Green
                            backgroundColor: 'rgba(16, 185, 129, 0.1)',
                            borderWidth: 3,
                            pointBackgroundColor: '#fff',
                            pointBorderColor: '#10B981',
                            pointRadius: 4,
                            pointHoverRadius: 6,
                            tension: 0.3,
                            spanGaps: true
                        },
                        {
                            label: 'OPA3 (檢查後處置)',
                            data: dataOPA3,
                            borderColor: '#F59E0B', // Yellow
                            backgroundColor: 'rgba(245, 158, 11, 0.1)',
                            borderWidth: 3,
                            pointBackgroundColor: '#fff',
                            pointBorderColor: '#F59E0B',
                            pointRadius: 4,
                            pointHoverRadius: 6,
                            tension: 0.3,
                            spanGaps: true
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        legend: {
                            position: 'top',
                            labels: {
                                usePointStyle: true,
                                padding: 20,
                                font: {
                                    family: "'Inter', sans-serif",
                                    size: 13
                                }
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(17, 24, 39, 0.9)',
                            titleFont: { size: 14, family: "'Inter', sans-serif" },
                            bodyFont: { size: 13, family: "'Inter', sans-serif" },
                            padding: 12,
                            cornerRadius: 8,
                            displayColors: true
                        }
                    },
                    scales: {
                        y: {
                            min: 0,
                            max: 9, // OPA最高分通常是9吧，如果不同請自行調整
                            title: {
                                display: true,
                                text: '信賴等級分數 (0-9)',
                                color: '#6B7280',
                                font: { size: 12, weight: '500' }
                            },
                            grid: {
                                color: '#F3F4F6',
                                drawBorder: false
                            },
                            ticks: {
                                stepSize: 1
                            }
                        },
                        x: {
                            grid: {
                                display: false,
                                drawBorder: false
                            },
                            ticks: {
                                color: '#6B7280',
                                font: { size: 12 }
                            }
                        }
                    }
                }
            });
        }

        async function fetchAttendance() {
            try {
                const res = await fetch('/api/student_attendance');
                const result = await res.json();
                
                const container = document.getElementById('attendanceContainer');
                if (result.success && result.data.length > 0) {
                    let html = `
                        <table id="attendanceTable" class="min-w-full divide-y divide-gray-200 table-fixed text-sm">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th scope="col" class="px-6 py-3 text-left font-medium text-gray-500 uppercase tracking-wider">簽到時間</th>
                                    <th scope="col" class="px-6 py-3 text-left font-medium text-gray-500 uppercase tracking-wider">退勤時間</th>
                                    <th scope="col" class="px-6 py-3 text-left font-medium text-gray-500 uppercase tracking-wider">檢查室</th>
                                    <th scope="col" class="px-6 py-3 text-left font-medium text-gray-500 uppercase tracking-wider">主護教師</th>
                                    <th scope="col" class="px-6 py-3 text-left font-medium text-gray-500 uppercase tracking-wider">共同教師</th>
                                </tr>
                            </thead>
                            <tbody class="bg-white divide-y divide-gray-200">
                    `;
                    
                    result.data.forEach(item => {
                        html += `
                            <tr class="hover:bg-gray-50">
                                <td class="px-6 py-4 whitespace-nowrap text-green-700">${item.check_in || '-'}</td>
                                <td class="px-6 py-4 whitespace-nowrap text-red-700">${item.check_out || '-'}</td>
                                <td class="px-6 py-4 whitespace-nowrap text-gray-900">${item.room || '-'}</td>
                                <td class="px-6 py-4 whitespace-nowrap text-gray-900">${item.teacher || '-'}</td>
                                <td class="px-6 py-4 whitespace-nowrap text-gray-500">${item.co_teacher || '-'}</td>
                            </tr>
                        `;
                    });
                    
                    html += `</tbody></table>`;
                    container.innerHTML = html;
                } else {
                    container.innerHTML = '<div class="text-center py-6 text-gray-500 text-sm">目前無任何出勤紀錄</div>';
                }
            } catch(e) {
                document.getElementById('attendanceContainer').innerHTML = '<div class="text-center py-6 text-red-500 text-sm">讀取出勤紀錄失敗</div>';
            }
        }

        function exportPDF() {
            const element = document.getElementById('attendanceContainer');
            // Check if there is data
            if(element.innerText.includes('無任何出勤紀錄') || element.innerText.includes('載入中')) {
                alert('目前沒有資料可以匯出唷！');
                return;
            }
            const opt = {
                margin:       1,
                filename:     `{{ student_info.name }}_出勤紀錄.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2 },
                jsPDF:        { unit: 'in', format: 'a4', orientation: 'landscape' }
            };
            
            // Generate PDF
            html2pdf().set(opt).from(element).save();
        }

        async function switchRole() {
            try {
                const res = await fetch('/switch_role', { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    window.location.href = '/';
                } else {
                    alert(data.error || '切換身份失敗');
                }
            } catch (e) {
                alert('網路錯誤');
            }
        }
    </script>
</body>

</html>
