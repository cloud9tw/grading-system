<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEEP 數據同步中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/font-awesome.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .spinner { border: 4px solid rgba(255, 255, 255, 0.1); border-left-color: #38bdf8; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="glass max-w-2xl w-full rounded-2xl p-8 shadow-2xl relative overflow-hidden">
        <!-- Decoration -->
        <div class="absolute -top-24 -right-24 w-48 height-48 bg-blue-500/10 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-24 -left-24 w-48 height-48 bg-purple-500/10 rounded-full blur-3xl"></div>

        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400 mb-2">CEEP 自動化同步</h1>
            <p class="text-slate-400">正在與台北醫學大學 CEEP 系統連動中...</p>
        </div>

        <!-- Progress Section -->
        <div id="loading-section" class="flex flex-col items-center py-6">
            <div class="spinner mb-6"></div>
            <div id="status-text" class="text-lg font-medium text-blue-300 mb-2">正在建立同步連線...</div>
            <p class="text-slate-500 text-sm mb-6">這可能需要數分鐘，請勿關閉視窗</p>
            
            <!-- Log Terminal Area -->
            <div id="log-container" class="w-full bg-slate-950/80 border border-slate-800 rounded-xl p-4 font-mono text-xs overflow-y-auto h-48 space-y-1 scroll-smooth">
                <div class="text-slate-500">$ 初始化串流連線...</div>
            </div>
        </div>

        <!-- Result Section (Hidden) -->
        <div id="result-section" class="hidden fade-in">
            <div class="bg-emerald-500/10 border border-emerald-500/20 rounded-xl p-6 mb-6">
                <div class="flex items-center text-emerald-400 font-semibold mb-4">
                    <i class="fas fa-check-circle mr-2"></i> 同步任務已圓滿完成！
                </div>
                
                <div class="space-y-3" id="task-list">
                    <!-- Tasks will be injected here -->
                </div>
            </div>

            <div class="flex flex-col items-center">
                <div id="countdown-text" class="text-slate-400 text-sm mb-4">將於 <span id="timer" class="font-bold text-white">5</span> 秒後自動返回管理頁面</div>
                <a href="/admin" class="px-6 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm transition-colors">立即返回</a>
            </div>
        </div>

        <!-- Error Section (Hidden) -->
        <div id="error-section" class="hidden fade-in">
            <div class="bg-red-500/10 border border-red-500/20 rounded-xl p-6 mb-6 text-center">
                <i class="fas fa-exclamation-triangle text-red-500 text-4xl mb-4"></i>
                <h3 class="text-xl font-bold text-red-400 mb-2">同步發生錯誤</h3>
                <p id="error-message" class="text-slate-400 text-sm mb-4"></p>
                <a href="/admin" class="inline-block px-8 py-3 bg-red-500 hover:bg-red-600 rounded-xl font-bold transition-all">返回管理中心</a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const statusText = document.getElementById('status-text');
            const loadingSec = document.getElementById('loading-section');
            const resultSec = document.getElementById('result-section');
            const errorSec = document.getElementById('error-section');
            const taskList = document.getElementById('task-list');
            const logContainer = document.getElementById('log-container');

            // 輔助函式：在日誌視窗中新增一行訊息
            function addLog(msg, type = 'blue') {
                const div = document.createElement('div');
                const colors = {
                    blue: 'text-blue-400',    // 一般進度 (藍色)
                    green: 'text-emerald-400', // 成功/完成 (綠色)
                    red: 'text-red-400',      // 錯誤 (紅色)
                    gray: 'text-slate-500'    // 系統資訊 (灰色)
                };
                div.className = `${colors[type] || colors.gray} break-words`;
                div.innerText = (type === 'blue' || type === 'green' ? '> ' : '$ ') + msg;
                logContainer.appendChild(div);
                // 自動捲動到底部
                logContainer.scrollTop = logContainer.scrollHeight;
            }

            // [SSE 核心邏輯]
            // 建立與伺服器端的 EventSource 持續性連線
            const eventSource = new EventSource('/api/sync_ceep_stream');

            // 監聽來自伺服器的自定義訊息事件
            eventSource.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    
                    // 根據訊息類型執行不同動作
                    if (data.type === 'log') {
                        // 1. 一般日誌訊息：直接顯示在 Terminal 並更新主標題
                        addLog(data.msg);
                        statusText.innerText = data.msg;
                    } 
                    else if (data.type === 'summary') {
                        // 2. 統計總結：抓取完成後產生的列表數據
                        addLog('正在生成任務清單...', 'green');
                        if (data.data && data.data.length > 0) {
                            data.data.forEach(task => {
                                const item = document.createElement('div');
                                item.className = 'flex justify-between items-center text-sm border-b border-white/5 pb-2 last:border-0 last:pb-0';
                                item.innerHTML = `
                                    <div class="flex flex-col">
                                        <span class="text-slate-300 font-medium">${task.form} - ${task.plan}</span>
                                        <span class="text-xs text-slate-500">${task.year}</span>
                                    </div>
                                    <span class="px-3 py-1 ${task.status === 'success' ? 'bg-blue-500/20 text-blue-400' : 'bg-red-500/20 text-red-400'} rounded-full text-xs">
                                        ${task.status === 'success' ? '+ ' + task.count + ' 筆' : '失敗'}
                                    </span>
                                `;
                                taskList.appendChild(item);
                            });
                        }
                    }
                    else if (data.type === 'done') {
                        // 3. 完工信號：關閉連線並切換 UI 到結果畫面
                        addLog(data.msg, 'green');
                        eventSource.close();
                        loadingSec.classList.add('hidden');
                        resultSec.classList.remove('hidden');

                        // 啟動自動跳轉倒數
                        let timeLeft = 5;
                        const timerEl = document.getElementById('timer');
                        const interval = setInterval(() => {
                            timeLeft--;
                            timerEl.innerText = timeLeft;
                            if (timeLeft <= 0) {
                                clearInterval(interval);
                                window.location.href = '/admin'; // 跳回管理門戶
                            }
                        }, 1000);
                    }
                    else if (data.type === 'error') {
                        // 4. 錯誤訊息：擲出例外由 catch 處理
                        throw new Error(data.msg);
                    }
                } catch (err) {
                    addLog(err.message, 'red');
                    eventSource.close();
                    loadingSec.classList.add('hidden');
                    errorSec.classList.remove('hidden');
                    document.getElementById('error-message').innerText = err.message;
                }
            };

            // 處理連線異常中斷
            eventSource.onerror = (err) => {
                console.error("SSE Connection Error:", err);
                addLog("與伺服器連線中斷或發生錯誤，同步可能已終止。", "red");
                eventSource.close();
            };
        });
    </script>
</body>
</html>
